<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: 150px repeat(5, 1fr); gap: 5px; max-width: 1000px; margin: auto; }
        .box { border: 1px solid #333; padding: 15px; text-align: center; background: #262626; cursor: pointer; min-height: 25px; }
        .header { background: #444; font-weight: bold; cursor: default; }
        .zeit { font-weight: bold; background: #333; border-right: 2px solid #555; text-align: left; }
        .besetzt { background: #007bff; color: white; }
        select { width: 100%; padding: 5px; background: #444; color: white; border: none; }
    </style>
</head>
<body>
    <h2 style="text-align:center;">SPORT PLANER</h2>
    <div class="grid" id="plan">
        <div class="box header">Zeit</div>
        <div class="box header"></div><div class="box header"></div>
        <div class="box header"></div><div class="box header"></div>
        <div class="box header"></div>
    </div>

    <script>
        const url = "HIER_DEINE_URL_EINTRAGEN";

        fetch(url).then(r => r.json()).then(data => {
            const container = document.getElementById('plan');
            data.forEach((row, i) => {
                if(i === 0) return; 
                container.innerHTML += `<div class="box zeit">${row[0]}</div>`;
                for(let j = 1; j <= 5; j++) {
                    let val = row[j] || "";
                    container.innerHTML += `
                        <div class="box ${val ? 'besetzt' : ''}" onclick="this.querySelector('span').style.display='none'; this.querySelector('select').style.display='block';">
                            <span>${val}</span>
                            <select style="display:none" onchange="saveData(${i}, ${j}, this.value)">
                                <option value="">frei</option>
                                <option value="Halle 1">Halle 1</option>
                                <option value="Halle 2">Halle 2</option>
                                <option value="Halle 3">Halle 3</option>
                                <option value="Halle 4">Halle 4</option>
                                <option value="U21">U21</option>
                            </select>
                        </div>`;
                }
            });
        });

        function saveData(row, col, val) {
            fetch(url, {
                method: "POST",
                body: JSON.stringify({row, col, val}),
                mode: "no-cors" // Wichtig, um CORS-Fehler zu vermeiden
            }).then(() => alert("Gespeichert! Seite neu laden."));
        }
    </script>
</body>
</html>
