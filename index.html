<script>
  // Deine URL ist korrekt hinterlegt
  fetch("https://script.google.com/macros/s/AKfycbxGV-J5CTk8xVKtIm_w_3LKSekWJPP_KFofDqejD5tZKcGVZhTnpZyg4_6N5th2MhSXiA/exec")
    .then(r => r.json())
    .then(data => {
      const container = document.getElementById('plan');
      // Wir starten bei 1, um die Kopfzeile (A1, B1 etc.) im Sheet zu überspringen
      for(let i = 1; i < data.length; i++) {
        let row = data[i];
        // Spalte A (Lektion)
        container.innerHTML += `<div class="box"><b>${row[0]}</b></div>`;
        // Spalten B bis F (Klassen)
        for(let j = 1; j <= 5; j++) {
          let status = row[j] || "frei"; // Falls Zelle leer, schreibe "frei"
          let isReserved = status.toLowerCase().includes("reserviert");
          container.innerHTML += `<div class="box ${isReserved ? 'reserviert' : ''}">${status}</div>`;
        }
      }
    });
</script>
