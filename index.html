<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Stundenplan Journal</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .wrapper { max-width: 1000px; margin: auto; }

        /* HEADER: Datum und Button */
        .top-bar { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 10px; margin-bottom: 20px; align-items: center; }
        #datePicker { padding: 10px; background: #333; color: white; border: 1px solid #444; }
        #saveBtn { padding: 10px; background: #333; color: #666; border: 1px solid #444; font-weight: bold; cursor: not-allowed; }
        #saveBtn.active { background: #27ae60; color: white; cursor: pointer; }

        /* GRID: Zeit-Spalte + 5 Klassen-Spalten */
        .grid { display: grid; grid-template-columns: 120px repeat(5, 1fr); gap: 2px; }
        .box { border: 1px solid #444; padding: 5px; background: #262626; min-height: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; font-size: 11px; position: relative; }
        .header-box { background: #333; font-weight: bold; }

        /* Farben */
        .bg-red { background: #c0392b !important; }
        .bg-blue { background: #2980b9 !important; }
        .bg-purple { background: #8e44ad !important; }
        .bg-yellow { background: #f1c40f !important; color: black !important; }

        .klasse { font-weight: bold; }
        .res { font-style: italic; font-size: 9px; margin-top: 2px; }
        select { width: 100%; height: 100%; position: absolute; top: 0; left: 0; opacity: 0; cursor: pointer; }
        .trennlinie { grid-column: 1 / span 6; height: 4px; background: #3498db; margin: 4px 0; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="top-bar">
            <input type="date" id="datePicker">
            <div id="headerTitle" style="text-align: center; font-weight: bold; font-size: 1.2rem;">WIRD GELADEN...</div>
            <button id="saveBtn" onclick="saveChanges()">SPEICHERN</button>
        </div>

        <div class="grid" id="plan">
            <div class="box header-box">Zeit</div>
            <div class="box header-box">1</div>
            <div class="box header-box">2</div>
            <div class="box header-box">3</div>
            <div class="box header-box">4</div>
            <div class="box header-box">5</div>
            </div>
    </div>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbzfB81kQO3eJy06b3O6-tFRHIH2S98p6C68mdpIxeLiw5cT56TlEQ6G83QNpI8dgw0v4A/exec";
        
        async function loadPlan() {
            const dateVal = document.getElementById('datePicker').value;
            const res = await fetch(`${url}?date=${dateVal}`);
            const data = await res.json();
            
            // Grid leeren, aber die Header-Boxen behalten!
            const grid = document.getElementById('plan');
            grid.innerHTML = `
                <div class="box header-box">Zeit</div>
                <div class="box header-box">1</div>
                <div class="box header-box">2</div>
                <div class="box header-box">3</div>
                <div class="box header-box">4</div>
                <div class="box header-box">5</div>
            `;

            data.forEach((row, rowIndex) => {
                if (rowIndex === 6) grid.innerHTML += `<div class="trennlinie"></div>`;
                grid.innerHTML += `<div class="box header-box">${row[0]}</div>`;
                for(let i = 1; i <= 5; i++) {
                    let val = row[i] || "";
                    let [kl, res] = val.split(' | ');
                    let color = res?.includes("Halle 1") ? "bg-red" : res?.includes("Halle 4") ? "bg-blue" : res?.includes("U21") ? "bg-purple" : res?.includes("Halle 2") ? "bg-yellow" : "";
                    grid.innerHTML += `
                        <div class="box ${color}" onclick="this.querySelector('select').style.opacity='1'">
                            <div class="klasse">${kl || ""}</div>
                            <div class="res">${res || ""}</div>
                            <select onchange="addChange(this, '${row[0]}', ${i}, '${kl || ""}')">
                                <option value="">---</option>
                                ${["Halle 1", "Halle 2", "Halle 3", "Halle 4", "U21", "Kletterwand"].map(r => `<option value="${r}">${r}</option>`).join('')}
                            </select>
                        </div>`;
                }
            });
        }
        
        // ... (addChange, saveChanges, Initialisierung wie gehabt) ...
    </script>
</body>
</html>
