<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Stundenplan Journal</title>
    <style>
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #27ae60; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: 120px repeat(5, 1fr); gap: 2px; max-width: 1000px; margin: auto; }
        .box { border: 1px solid #444; padding: 5px; background: #262626; min-height: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; font-size: 11px; position: relative; }
        .zeit-box { background: #333; font-weight: bold; }
        .klasse { font-weight: bold; margin-bottom: 2px; }
        .res { color: #27ae60; font-size: 10px; font-weight: bold; } /* Hier steht die Reservierung */
        select { width: 100%; height: 100%; position: absolute; top: 0; left: 0; opacity: 0; cursor: pointer; }
    </style>
</head>
<body>
    <div style="text-align: center; margin-bottom: 20px;">
        <input type="date" id="datePicker" onchange="loadPlan()">
        <button onclick="saveChanges()">Speichern</button>
        <div id="loader" class="loader"></div>
    </div>
    <div class="grid" id="plan"></div>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbzfB81kQO3eJy06b3O6-tFRHIH2S98p6C68mdpIxeLiw5cT56TlEQ6G83QNpI8dgw0v4A/exec";
        let pendingChanges = [];

        async function loadPlan() {
            document.getElementById('loader').style.display = 'block';
            const date = document.getElementById('datePicker').value;
            const res = await fetch(`${url}?date=${date}`);
            const data = await res.json();
            
            const container = document.getElementById('plan');
            container.innerHTML = "";
            
            data.forEach((row) => {
                container.innerHTML += `<div class="box zeit-box">${row[0]}</div>`;
                for(let i = 1; i <= 5; i++) {
                    let val = row[i] || "";
                    let teile = val.split(' | ');
                    let klasse = teile[0];
                    let reservierung = teile[1] || "";
                    
                    container.innerHTML += `
                        <div class="box" onclick="this.querySelector('select').style.opacity='1'">
                            <div class="klasse">${klasse}</div>
                            <div class="res">${reservierung}</div>
                            <select onchange="addChange(this, '${row[0]}', ${i}, '${klasse}')">
                                <option value="">---</option>
                                ${["Halle 1", "Halle 2", "Halle 3", "Halle 4", "U21", "Kletterwand"].map(r => `<option value="${r}">${r}</option>`).join('')}
                            </select>
                        </div>`;
                }
            });
            document.getElementById('loader').style.display = 'none';
        }

        function addChange(el, time, slotIndex, klasse) {
            let res = el.value;
            let anzeigeText = (res === "" || res === "---") ? "" : res;
            
            el.parentElement.querySelector('.res').innerText = anzeigeText;
            // Wir speichern im Sheet wieder als "Klasse | Reservierung", damit es beim nächsten Laden wieder getrennt werden kann
            let speicherWert = (res === "" || res === "---") ? klasse : klasse + " | " + res;
            
            pendingChanges.push({ time, slotIndex, val: speicherWert });
            el.style.opacity = '0';
        }

        async function saveChanges() {
            document.getElementById('loader').style.display = 'block';
            const date = document.getElementById('datePicker').value;
            await fetch(url, { method: "POST", body: JSON.stringify({ date: date, changes: pendingChanges }) });
            pendingChanges = [];
            loadPlan();
        }

        document.getElementById('datePicker').valueAsDate = new Date();
        loadPlan();
    </script>
</body>
</html>
