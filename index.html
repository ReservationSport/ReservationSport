<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reservation Sport - Full System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --accent: #e67e22; 
            --bg: #1a1a1a; 
            --card: #262626; 
            --text: #ffffff; 
            --green: #27ae60; 
            --red: #e74c3c; 
            --border: #444;
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding: 20px; 
            margin: 0; 
            -webkit-tap-highlight-color: transparent; 
        }

        .grid { 
            display: grid; 
            grid-template-columns: 120px repeat(5, 1fr); 
            gap: 2px; 
            max-width: 1200px; 
            margin: auto; 
            background: #000;
            border: 1px solid var(--border);
        }

        /* Navigation & Header */
        .date-control { 
            text-align: center; 
            margin-bottom: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 15px; 
            position: relative; 
        }

        .global-loader { 
            position: absolute; 
            left: 20px; 
            width: 30px; 
            height: 30px; 
            border: 4px solid #444; 
            border-top: 4px solid var(--green); 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            display: none; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .nav-group { display: flex; gap: 5px; }
        
        #datePicker { 
            padding: 10px; 
            background: #333; 
            color: white; 
            border: 1px solid var(--border); 
            height: 40px; 
            box-sizing: border-box; 
            cursor: pointer; 
            border-radius: 4px; 
            font-size: 16px;
        }

        .nav-btn { 
            height: 40px; 
            width: 40px; 
            background: #333; 
            border: 1px solid var(--border); 
            color: white; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 16px; 
            border-radius: 4px; 
        }
        .nav-btn:hover { background: #444; }

        .refresh-btn { 
            height: 40px; 
            width: 40px; 
            background: #333; 
            border: 1px solid var(--border); 
            color: var(--accent); 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 18px; 
            border-radius: 4px; 
        }

        /* Zellen-Styling */
        .box { 
            border: 1px solid #333; 
            padding: 5px; 
            background: var(--card); 
            min-height: 55px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            font-size: 11px; 
            position: relative; 
            cursor: pointer; 
            overflow: hidden; 
        }

        .box.empty { pointer-events: none; opacity: 0.5; background: #1a1a1a; }
        .box.not-mine { pointer-events: none !important; opacity: 0.8; } 
        .box.is-mine { border: 2px solid var(--accent) !important; z-index: 5; }

        .box.ausfall-mode { 
            background-color: #000 !important; 
            background-image: linear-gradient(45deg, #111 25%, transparent 25%, transparent 50%, #111 50%, #111 75%, transparent 75%, transparent);
            background-size: 20px 20px;
        }
        .box.ausfall-mode .res { color: var(--red); font-weight: bold; }

        .box.outdoor-mode { background-color: var(--green) !important; }
        .box.outdoor-mode .res { color: white; font-weight: bold; }

        .stift { 
            position: absolute; 
            top: 2px; 
            right: 4px; 
            z-index: 10; 
            color: var(--accent); 
            font-size: 20px; 
            text-shadow: 0 0 4px #000;
        }

        .zeit-box { background: #333; font-weight: bold; cursor: default; color: #aaa; }
        .header-row { 
            grid-column: span 6; 
            background: #333; 
            font-size: 14px; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 50px; 
            position: relative;
        }

        .info-box { grid-column: span 6; padding: 40px; text-align: center; color: #888; font-style: italic; }

        /* Form-Elemente */
        select { 
            width: 100%; 
            height: 100%; 
            position: absolute; 
            top: 0; 
            left: 0; 
            opacity: 0; 
            cursor: pointer; 
            z-index: 2; 
        }
        .extra-select { 
            z-index: -1; 
            pointer-events: none; 
            opacity: 0; 
            position: absolute;
        }

        /* Login-Overlay */
        #loginOverlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #1a1a1a; 
            z-index: 2000; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
        }
        #loginOverlay input { 
            padding: 15px; 
            margin: 8px; 
            background: #333; 
            border: 1px solid var(--border); 
            color: white; 
            border-radius: 8px; 
            width: 280px; 
            font-size: 16px; 
        }
        #loginOverlay button { 
            padding: 15px; 
            margin-top: 15px; 
            background: var(--accent); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 310px; 
            font-size: 18px; 
        }

        /* Speichern */
        .save-container { position: absolute; right: 10px; display: flex; align-items: center; gap: 10px; }
        .save-btn { 
            padding: 8px 20px; 
            background: var(--accent); 
            color: white; 
            border: none; 
            border-radius: 20px; 
            font-weight: bold; 
            cursor: pointer; 
            display: none; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
        }
        .save-btn.success { background: var(--green); }
        
        .sport-loader { font-size: 20px; display: none; }
        .sport-loader.active { display: block; animation: bounce 0.6s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }

        .divider-thin { grid-column: 1 / span 6; height: 1px; background: #444; margin: 2px 0; }
        .divider-thick { grid-column: 1 / span 6; height: 4px; background: #555; margin: 5px 0; }

        .klasse { font-weight: bold; }
        .lehrer-info { font-size: 9px; color: #999; margin-top: 1px; }
        .res { font-style: italic; font-size: 9px; margin-top: 2px; color: var(--accent); }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 70px repeat(5, 1fr); }
            body { padding: 5px; }
            .box { font-size: 10px; min-height: 50px; }
            .lehrer-info { display: none; }
        }
    </style>
</head>
<body onclick="closeAllExtraMenus()">

    <div id="loginOverlay">
        <h2 style="color:var(--accent); margin-bottom:20px;">Reservation Sport</h2>
        <input type="text" id="kuerzelInput" placeholder="Kürzel">
        <input type="password" id="pwInput" placeholder="Passwort">
        <button id="loginBtn" onclick="checkLogin()">Anmelden</button>
        <div id="loginBall" class="sport-loader">🏀</div>
        <p id="loginError" style="color: var(--red); margin-top: 10px;"></p>
    </div>

    <div class="date-control">
        <div id="globalLoader" class="global-loader"></div>
        <div class="nav-group">
            <button class="nav-btn" onclick="changeDate(-7)">⏮</button>
            <button class="nav-btn" onclick="changeDate(-1)">◀</button>
        </div>
        <button class="nav-btn" onclick="goToToday()"><i class="fas fa-home"></i></button>
        <input type="date" id="datePicker" onchange="loadPlan()">
        <div class="nav-group">
            <button class="nav-btn" onclick="changeDate(1)">▶</button>
            <button class="nav-btn" onclick="changeDate(7)">⏭</button>
            <button class="refresh-btn" onclick="loadPlan()"><i class="fas fa-sync-alt"></i></button>
        </div>
    </div>

    <div class="grid" id="plan"></div>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbzGG2N5Bg1lz_SDcckkaC1F6sEJa5gxnlmcgJ4TuPLv_4UqIfgq2CwcH8tMDM09VnOf/exec"; 
        let pendingChanges = [], configFarben = {}, userPw = "", userKuerzel = "", pressTimer;
        let currentPlanData = [], lastStableDate = "", myClasses = [], allClassTeachers = {};

        // Warnung beim Verlassen
        window.onbeforeunload = () => { if(pendingChanges.length > 0) return "Änderungen nicht gespeichert!"; };

        async function checkLogin() {
            const btn = document.getElementById('loginBtn'), ball = document.getElementById('loginBall');
            const pw = document.getElementById('pwInput').value;
            const kz = document.getElementById('kuerzelInput').value.trim().toLowerCase();
            if(!kz || !pw) return;
            btn.style.display = 'none'; ball.classList.add('active');
            try {
                const res = await fetch(`${url}?mode=login&pw=${pw}&kuerzel=${kz}`);
                const json = await res.json();
                if (json.error) {
                    document.getElementById('loginError').innerText = "Login ungültig";
                    btn.style.display = 'block'; ball.classList.remove('active');
                } else {
                    userPw = pw; userKuerzel = kz;
                    document.getElementById('loginOverlay').style.display = 'none';
                    loadPlan();
                }
            } catch(e) { btn.style.display = 'block'; ball.classList.remove('active'); }
        }

        async function loadPlan() {
            const dp = document.getElementById('datePicker');
            if (pendingChanges.length > 0 && !confirm("Ungespeicherte Änderungen gehen verloren!")) {
                dp.value = lastStableDate; return;
            }
            lastStableDate = dp.value;
            const container = document.getElementById('plan');
            document.getElementById('globalLoader').style.display = 'block';
            
            try {
                const res = await fetch(`${url}?date=${dp.value}&pw=${userPw}&kuerzel=${userKuerzel}`);
                const json = await res.json();
                if (json.error === "SPERRE") {
                    container.innerHTML = `<div class="info-box">${json.msg}</div>`;
                } else {
                    renderGrid(json);
                }
            } catch(e) { console.error(e); }
            document.getElementById('globalLoader').style.display = 'none';
        }

        function renderGrid(json) {
            const container = document.getElementById('plan');
            container.innerHTML = "";
            currentPlanData = json.data;
            myClasses = json.userClasses || [];
            allClassTeachers = json.allClassTeachers || {};
            pendingChanges = [];
            
            const data = json.data, options = json.options;
            options.forEach(o => configFarben[o[0]] = o[1]);
            
            data.forEach((row, rowIndex) => {
                if (rowIndex === 0) {
                    container.innerHTML += `
                        <div class="box header-row">
                            <span>${new Date(document.getElementById('datePicker').value).toLocaleDateString('de-DE', {weekday:'long', day:'2-digit', month:'2-digit'})}</span>
                            <div class="save-container">
                                <div id="sport-loader" class="sport-loader">🏀</div>
                                <button id="saveBtn" class="save-btn" onclick="saveChanges()">SPEICHERN</button>
                            </div>
                        </div>`;
                } else {
                    if (rowIndex === 4 || rowIndex === 10) container.innerHTML += `<div class="divider-thin"></div>`;
                    if (rowIndex === 7) container.innerHTML += `<div class="divider-thick"></div>`;
                    
                    container.innerHTML += `<div class="box zeit-box">${row[0]}</div>`;
                    
                    // Belegung der aktuellen Reihe prüfen (für Dropdown-Validierung)
                    let usedInRow = [];
                    for(let j=1; j<=5; j++) {
                        let r = (row[j]||"").split(' | ')[1];
                        if(r && !["Outdoor","Ausfall"].includes(r)) usedInRow.push(r);
                    }

                    for(let i=1; i<=5; i++) {
                        const cell = row[i] || "", teile = cell.split(' | '), kl = teile[0], rs = teile[1]||"", km = teile[2]||"";
                        const canEdit = myClasses.includes(kl.trim());
                        const teacher = kl.split('/').map(k => allClassTeachers[k.trim()] || "").filter(t => t).join(" / ");
                        const hasStift = km.startsWith("KOMMENTAR:");

                        container.innerHTML += `
                        <div class="box ${kl.trim()===""?'empty':''} ${!canEdit?'not-mine':'is-mine'} ${rs==='Ausfall'?'ausfall-mode':''} ${rs==='Outdoor'?'outdoor-mode':''}" 
                             data-row="${rowIndex}" data-col="${i}" 
                             oncontextmenu="handleRightClick(event, this)"
                             ontouchstart="handleTouchStart(this)" ontouchend="handleTouchEnd()"
                             style="background-color: ${(['Ausfall','Outdoor'].includes(rs)) ? '' : configFarben[rs] || ''}">
                             
                             ${hasStift ? `<span class="stift" onclick="event.stopPropagation(); alert('Notiz: ${km.replace('KOMMENTAR:','').trim()}')"><i class="fas fa-comment-dots"></i></span>` : ''}
                             <div class="klasse">${kl}</div>
                             <div class="lehrer-info">${teacher}</div>
                             <div class="res">${rs}</div>
                             
                             ${canEdit ? `
                             <select onchange="addChange(this, '${row[0]}', ${i}, '${kl}')">
                                <option value="">--- Halle wählen ---</option>
                                ${options.filter(o => rs === o[0] || !usedInRow.some(u => o[0].split(' ').some(p => p!=='Halle' && u.includes(p))))
                                  .map(o => `<option value="${o[0]}" ${rs===o[0]?'selected':''}>${o[0]}</option>`).join('')}
                             </select>
                             <select class="extra-select" onchange="handleExtra(this, '${row[0]}', ${i}, '${kl}')">
                                <option value="">--- Status zurücksetzen ---</option>
                                <option value="Outdoor">🌳 Outdoor</option>
                                <option value="Ausfall">❌ Ausfall</option>
                                <option value="Notiz">📝 Notiz hinzufügen</option>
                                <option value="DelNotiz">🗑️ Notiz löschen</option>
                             </select>` : ''}
                        </div>`;
                    }
                }
            });
        }

        // --- Logik ---

        window.addChange = (el, time, slot, klasse) => {
            const res = el.value, p = el.parentElement, r = p.dataset.row, c = p.dataset.col;
            p.classList.remove('ausfall-mode', 'outdoor-mode');
            p.querySelector('.res').innerText = res;
            p.style.backgroundColor = configFarben[res] || "";
            updatePending(r, c, time, slot, klasse, res, getComment(r, c));
        };

        window.handleExtra = (el, time, slot, klasse) => {
            const act = el.value, p = el.parentElement, r = p.dataset.row, c = p.dataset.col;
            let currentRes = p.querySelector('.res').innerText;
            let currentComm = getComment(r, c);

            if (act === "") { // DER RESET (dein Wunsch: Striche löschen Halle/Status)
                p.classList.remove('ausfall-mode', 'outdoor-mode');
                p.style.backgroundColor = "";
                p.querySelector('.res').innerText = "";
                const hSel = p.querySelector('select:not(.extra-select)');
                if(hSel) hSel.value = "";
                updatePending(r, c, time, slot, klasse, "", currentComm);
            } else if (act === "Outdoor" || act === "Ausfall") {
                p.classList.remove('ausfall-mode', 'outdoor-mode');
                p.classList.add(act.toLowerCase() + '-mode');
                p.querySelector('.res').innerText = act;
                p.style.backgroundColor = "";
                updatePending(r, c, time, slot, klasse, act, currentComm);
            } else if (act === "Notiz") {
                const n = prompt("Notiz für " + klasse + ":");
                if(n !== null) updatePending(r, c, time, slot, klasse, currentRes, "KOMMENTAR:" + n);
            } else if (act === "DelNotiz") {
                updatePending(r, c, time, slot, klasse, currentRes, "");
            }
            closeAllExtraMenus(); el.value = "";
        };

        function updatePending(r, c, time, slot, kl, res, comm) {
            // Hier wird der String zusammengesetzt: KLASSE | RES | KOMMENTAR
            let val = kl + (res ? " | " + res : " | ") + (comm ? " | " + comm : "");
            currentPlanData[r][c] = val;
            pendingChanges = pendingChanges.filter(ch => !(ch.time === time && ch.slotIndex === slot));
            pendingChanges.push({ time, slotIndex: slot, val });
            document.getElementById('saveBtn').style.display = 'block';
            // Kleiner UI-Refresh für den Stift
            if(comm !== undefined) loadPlan();
        }

        function getComment(r, c) {
            const val = currentPlanData[r][c] || "";
            return val.split(' | ')[2] || "";
        }

        window.saveChanges = async () => {
            const btn = document.getElementById('saveBtn'), ball = document.getElementById('sport-loader');
            btn.style.display = 'none'; ball.classList.add('active');
            try {
                const res = await fetch(url, {
                    method: "POST",
                    body: JSON.stringify({
                        date: document.getElementById('datePicker').value,
                        changes: pendingChanges,
                        pw: userPw, kuerzel: userKuerzel
                    })
                });
                const result = await res.json();
                if(result.status === "success") {
                    btn.innerText = "Check! ✅"; btn.classList.add('success');
                    btn.style.display = 'block'; ball.classList.remove('active');
                    pendingChanges = [];
                    setTimeout(() => { 
                        btn.style.display = 'none'; 
                        btn.classList.remove('success'); 
                        btn.innerText = "SPEICHERN"; 
                    }, 2000);
                }
            } catch(e) { 
                ball.classList.remove('active'); 
                btn.style.display = 'block'; 
                alert("Fehler beim Speichern!"); 
            }
        };

        // --- Hilfen ---

        window.handleRightClick = (e, el) => { e.preventDefault(); openExtra(el); };
        window.handleTouchStart = (el) => { pressTimer = setTimeout(() => openExtra(el), 600); };
        window.handleTouchEnd = () => clearTimeout(pressTimer);

        function openExtra(el) {
            closeAllExtraMenus();
            const s = el.querySelector('.extra-select');
            if(!s) return;
            s.style.zIndex = "100"; s.style.opacity = "1"; s.style.pointerEvents = "all";
            if (s.showPicker) s.showPicker(); else s.click();
        }

        window.closeAllExtraMenus = () => {
            document.querySelectorAll('.extra-select').forEach(s => { 
                s.style.zIndex = "-1"; s.style.opacity = "0"; s.style.pointerEvents = "none"; 
            });
        };

        window.changeDate = (n) => {
            const dp = document.getElementById('datePicker');
            let d = new Date(dp.value); d.setDate(d.getDate() + n);
            dp.valueAsDate = d; loadPlan();
        };

        window.goToToday = () => {
            const dp = document.getElementById('datePicker'), t = new Date();
            t.setMinutes(t.getMinutes() - t.getTimezoneOffset());
            dp.value = t.toISOString().split('T')[0]; loadPlan();
        };

        document.addEventListener('DOMContentLoaded', () => {
            const t = new Date(); t.setMinutes(t.getMinutes() - t.getTimezoneOffset());
            document.getElementById('datePicker').value = t.toISOString().split('T')[0];
        });
    </script>
</body>
</html>
