<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: 150px repeat(4, 1fr); gap: 5px; max-width: 1000px; margin: auto; }
        .box { border: 1px solid #333; padding: 15px; text-align: center; background: #262626; }
        .header { background: #444; font-weight: bold; }
        .zeit { font-weight: bold; background: #333; border-right: 2px solid #555; }
        .besetzt { background: #007bff; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="text-align:center;">SPORT PLANER</h2>
    <div class="grid" id="plan">
        <div class="box header">Zeit</div>
        <div class="box header"></div>
        <div class="box header"></div>
        <div class="box header"></div>
        <div class="box header"></div>
    </div>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbxGV-J5CTk8xVKtIm_w_3LKSekWJPP_KFofDqejD5tZKcGVZhTnpZyg4_6N5th2MhSXiA/exec";

        fetch(url)
            .then(r => r.json())
            .then(data => {
                const container = document.getElementById('plan');
                // Daten anzeigen
                for(let i = 1; i < data.length; i++) {
                    let row = data[i];
                    container.innerHTML += `<div class="box zeit">${row[0]}</div>`;
                    for(let j = 1; j <= 4; j++) {
                        let inhalt = row[j] || "";
                        let klasse = inhalt !== "" ? "besetzt" : "";
                        container.innerHTML += `<div class="box ${klasse}">${inhalt}</div>`;
                    }
                }
            });
    </script>
</body>
</html>
