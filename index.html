<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Sport Planer Pro</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .nav { text-align: center; margin-bottom: 20px; background: #333; padding: 15px; border-radius: 8px; }
        .grid { display: grid; grid-template-columns: 100px repeat(5, 1fr); gap: 5px; max-width: 1000px; margin: auto; }
        .box { border: 1px solid #333; padding: 5px; background: #262626; min-height: 50px; position: relative; display: flex; align-items: center; justify-content: center; }
        select { width: 100%; height: 100%; position: absolute; opacity: 0; cursor: pointer; }
        .save-btn { padding: 10px 20px; background: #27ae60; border: none; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="nav">
        <input type="date" id="datePicker" onchange="loadPlan()">
        <button onclick="saveAllChanges()" class="save-btn">Speichern</button>
    </div>

    <div class="grid" id="plan"></div>

    <script>
        // Deine URL wurde hier eingefügt
        const url = "https://script.google.com/macros/s/AKfycbxGV-J5CTk8xVKtIm_w_3LKSekWJPP_KFofDqejD5tZKcGVZhTnpZyg4_6N5th2MhSXiA/exec";
        let pendingChanges = [];

        async function loadPlan() {
            const date = document.getElementById('datePicker').value;
            const res = await fetch(`${url}?date=${date}`);
            const data = await res.json();
            const container = document.getElementById('plan');
            container.innerHTML = "";

            data.forEach((row) => {
                // Zeit wird aus der Spalte 1 (Index 1) genommen
                let time = row[1]; 
                container.innerHTML += `<div class="box">${time}</div>`;
                // Slots (Spalten C-G, also Index 2-6)
                for(let i = 2; i <= 6; i++) {
                    container.innerHTML += `
                        <div class="box" onclick="this.querySelector('select').style.opacity='1'">
                            ${row[i] || ""}
                            <select onchange="addChange(this, '${date}', '${time}', ${i})">
                                <option value="">---</option>
                                <option value="Klasse 1">Klasse 1</option>
                                <option value="Klasse 2">Klasse 2</option>
                            </select>
                        </div>`;
                }
            });
        }

        function addChange(el, date, time, slotIndex) {
            pendingChanges.push({ date, time, slotIndex, val: el.value });
            el.parentElement.childNodes[0].textContent = el.value;
        }

        async function saveAllChanges() {
            for (let change of pendingChanges) {
                await fetch(url, { method: "POST", body: JSON.stringify(change), mode: "no-cors" });
            }
            alert("Erfolgreich gespeichert!");
            location.reload();
        }

        document.getElementById('datePicker').valueAsDate = new Date();
        loadPlan();
    </script>
</body>
</html>
