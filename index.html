<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Stundenplan Journal</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: 120px repeat(5, 1fr); gap: 2px; max-width: 1000px; margin: auto; }
        .date-control { text-align: center; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; gap: 15px; position: relative; }
        .global-loader { position: absolute; right: 0; width: 30px; height: 30px; border: 4px solid #444; border-top: 4px solid #27ae60; border-radius: 50%; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .nav-group { display: flex; gap: 5px; }
        #datePicker { padding: 10px; background: #333; color: white; border: 1px solid #444; height: 40px; box-sizing: border-box; cursor: pointer; }
        .nav-btn { height: 40px; width: 40px; background: #333; border: 1px solid #444; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .nav-btn:hover { background: #444; }
        .box { border: 1px solid #444; padding: 5px; background: #262626; min-height: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; font-size: 11px; position: relative; cursor: pointer; }
        .zeit-box { background: #333; font-weight: bold; cursor: default; }
        .klasse { font-weight: bold; }
        .res { font-style: italic; font-size: 9px; margin-top: 2px; }
        .bg-red { background: #c0392b !important; }
        .bg-blue { background: #2980b9 !important; }
        .bg-purple { background: #8e44ad !important; }
        .bg-yellow { background: #f1c40f !important; color: black !important; }
        select { width: 100%; height: 100%; position: absolute; top: 0; left: 0; opacity: 0; cursor: pointer; }
        .save-container { position: absolute; right: 10px; z-index: 10; display: flex; align-items: center; }
        .save-btn { padding: 5px 15px; background: #444; border: 1px solid #666; color: white; cursor: pointer; font-size: 10px; border-radius: 3px; }
        .save-btn.pending { background: #27ae60; }
        .sport-loader { font-size: 20px; display: none; animation: bounce 0.6s infinite alternate; }
        @keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-10px); } }
        .divider-thin { grid-column: 1 / span 6; height: 1px; background: #444; margin: 2px 0; }
        .divider-thick { grid-column: 1 / span 6; height: 4px; background: #444; margin: 5px 0; }
    </style>
</head>
<body>
    <div class="date-control">
        <div class="nav-group">
            <button class="nav-btn" onclick="changeDate(-7)">⏮</button>
            <button class="nav-btn" onclick="changeDate(-1)">◀</button>
        </div>
        <input type="date" id="datePicker">
        <div class="nav-group">
            <button class="nav-btn" onclick="changeDate(1)">▶</button>
            <button class="nav-btn" onclick="changeDate(7)">⏭</button>
        </div>
        <div id="globalLoader" class="global-loader"></div>
    </div>
    <div class="grid" id="plan"></div>

    <script>
        const url = "HIER_DEINE_WEB_APP_URL_EINTRAGEN";
        let pendingChanges = [];

        function toggleLoader(show) { document.getElementById('globalLoader').style.display = show ? 'block' : 'none'; }

        async function loadPlan() {
            const dateVal = document.getElementById('datePicker').value;
            if (!dateVal) return;
            toggleLoader(true);
            const container = document.getElementById('plan');
            container.innerHTML = "";
            pendingChanges = [];

            const res = await fetch(`${url}?date=${dateVal}`);
            const {plan, options} = await res.json();
            
            plan.forEach((row, index) => {
                if (index === 4 || index === 10) container.innerHTML += `<div class="divider-thin"></div>`;
                if (index === 7) container.innerHTML += `<div class="divider-thick"></div>`;
                
                // Header-Zeile (nur beim ersten Mal)
                if (index === 0) {
                    container.innerHTML += `
                        <div class="box zeit-box">Zeit</div>
                        <div class="box" style="grid-column: span 5; font-weight:bold;">
                            ${row[0]}
                            <div class="save-container">
                                <div id="sport-loader" class="sport-loader">⚽</div>
                                <button id="saveBtn" class="save-btn" onclick="saveChanges()">SPEICHERN</button>
                            </div>
                        </div>`;
                }
                
                container.innerHTML += `<div class="box zeit-box">${row[1]}</div>`;
                for(let i = 2; i <= 6; i++) {
                    let val = row[i] || "";
                    let [klasse, reservierung] = val.split(' | ');
                    container.innerHTML += `
                        <div class="box ${getFarbe(reservierung || "")}">
                            <div class="klasse">${klasse || ""}</div>
                            <div class="res">${reservierung || ""}</div>
                            <select onchange="addChange(this, '${row[1]}', ${i-2}, '${klasse || ""}')">
                                <option value="">---</option>
                                ${options.map(r => `<option value="${r}" ${reservierung === r ? 'selected' : ''}>${r}</option>`).join('')}
                            </select>
                        </div>`;
                }
            });
            toggleLoader(false);
        }

        window.addChange = function(el, time, slotIndex, klasse) {
            pendingChanges.push({ time, slotIndex, val: klasse + " | " + el.value });
            el.parentElement.querySelector('.res').innerText = el.value;
            el.parentElement.className = `box ${getFarbe(el.value)}`;
            document.getElementById('saveBtn').classList.add('pending');
        };

        window.saveChanges = async function() {
            if (pendingChanges.length === 0) return;
            const btn = document.getElementById('saveBtn');
            const ball = document.getElementById('sport-loader');
            btn.style.display = 'none';
            ball.style.display = 'block';
            await fetch(url, { method: "POST", body: JSON.stringify({ date: document.getElementById('datePicker').value, changes: pendingChanges }) });
            pendingChanges = [];
            ball.style.display = 'none';
            btn.style.display = 'block';
            btn.classList.remove('pending');
            btn.innerText = "GESPEICHERT!";
            setTimeout(() => { btn.innerText = "SPEICHERN"; }, 2000);
        };

        window.changeDate = function(days) {
            const dp = document.getElementById('datePicker');
            let date = new Date(dp.value);
            date.setDate(date.getDate() + days);
            dp.valueAsDate = date;
            loadPlan();
        };

        function getFarbe(res) {
            if (res.includes("Halle 1")) return "bg-red";
            if (res.includes("Halle 4")) return "bg-blue";
            if (res.includes("U21")) return "bg-purple";
            if (res.includes("Halle 2")) return "bg-yellow";
            return "";
        }

        document.addEventListener('DOMContentLoaded', () => {
            const dp = document.getElementById('datePicker');
            dp.valueAsDate = new Date();
            dp.addEventListener('change', loadPlan);
            loadPlan();
        });
    </script>
</body>
</html>
