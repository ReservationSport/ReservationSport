<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Stundenplan Journal</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: 120px repeat(5, 1fr); gap: 2px; max-width: 1000px; margin: auto; }
        .box { border: 1px solid #444; padding: 5px; background: #262626; min-height: 50px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; font-size: 11px; position: relative; }
        .zeit-box { background: #333; font-weight: bold; cursor: default; }
        select { width: 100%; height: 100%; position: absolute; top: 0; left: 0; opacity: 0; cursor: pointer; }
    </style>
</head>
<body>
    <div style="text-align: center; margin-bottom: 20px;">
        <input type="date" id="datePicker" onchange="loadPlan()" style="padding: 10px;">
        <button onclick="saveChanges()" style="padding: 10px 20px; background: #27ae60; border: none; color: white; cursor: pointer;">Speichern</button>
    </div>
    <div class="grid" id="plan"></div>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbzfB81kQO3eJy06b3O6-tFRHIH2S98p6C68mdpIxeLiw5cT56TlEQ6G83QNpI8dgw0v4A/exec";
        let pendingChanges = [];
        const resOptionen = ["Halle 1", "Halle 2", "Halle 3", "Halle 4", "U21", "Kletterwand"];

        async function loadPlan() {
            const date = document.getElementById('datePicker').value;
            const res = await fetch(`${url}?date=${date}`);
            const data = await res.json();
            const container = document.getElementById('plan');
            container.innerHTML = "";
            data.forEach((row) => {
                container.innerHTML += `<div class="box zeit-box">${row[0]}</div>`;
                for(let i = 1; i <= 5; i++) {
                    let val = row[i] || "";
                    container.innerHTML += `
                        <div class="box" onclick="this.querySelector('select').style.opacity='1'">
                            <span id="slot-${row[0]}-${i}">${val}</span>
                            <select onchange="addChange(this, '${date}', '${row[0]}', ${i})">
                                <option value="">---</option>
                                ${resOptionen.map(r => `<option value="${r}">${r}</option>`).join('')}
                            </select>
                        </div>`;
                }
            });
        }

        function addChange(el, date, time, slotIndex) {
            let res = el.value;
            let alterText = el.parentElement.querySelector('span').innerText;
            let klasse = alterText.split(' | ')[0];
            let neuerWert = (res === "" || res === "---") ? klasse : klasse + " | " + res;
            pendingChanges.push({ date, time, slotIndex, val: neuerWert });
            el.parentElement.querySelector('span').innerText = neuerWert;
            el.style.opacity = '0';
        }

        async function saveChanges() {
            const response = await fetch(url, { method: "POST", body: JSON.stringify(pendingChanges) });
            const result = await response.json();
            if(result.status === "success") {
                pendingChanges = [];
                alert("Reservierung gespeichert!");
                loadPlan(); // Hier wird der Plan sofort aktualisiert
            }
        }

        document.getElementById('datePicker').valueAsDate = new Date();
        loadPlan();
    </script>
</body>
</html>
