<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Sport Planer</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: 150px repeat(5, 1fr); gap: 5px; max-width: 1000px; margin: auto; }
        
        /* Boxen: Jetzt mit flexibler Ausrichtung für perfekte vertikale & horizontale Zentrierung */
        .box { 
            border: 1px solid #333; 
            padding: 5px; 
            background: #262626; 
            cursor: pointer; 
            min-height: 55px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; /* Vertikal zentriert */
            align-items: center;     /* Horizontal zentriert */
            text-align: center;
        }
        
        /* Spezielle Ausrichtung für die Zeitspalte */
        .zeit { 
            background: #333; 
            border-right: 2px solid #555; 
            font-weight: bold;
            display: flex;
            justify-content: center; /* Zeit zentriert */
            align-items: center; 
        }

        .header { background: #444; font-weight: bold; }
        .header-tag { background: #444 !important; color: #fff; font-weight: bold; grid-column: span 4; font-size: 1.5em; display: flex; justify-content: center; align-items: center; }
        
        .btn-cell { background: #444 !important; display: flex; align-items: center; justify-content: center; }
        .save-btn { padding: 8px 12px; font-size: 0.7em; cursor: not-allowed; background: #555; color: #aaa; border: none; border-radius: 3px; font-weight: bold; text-transform: uppercase; }
        .save-btn.active { background: #27ae60; color: white; cursor: pointer; }
        
        /* Hallen-Farben */
        .halle1 { background-color: #e74c3c !important; }
        .halle2 { background-color: #f1c40f !important; color: black !important; }
        .halle3 { background-color: #2ecc71 !important; }
        .halle4 { background-color: #3498db !important; }
        .u21    { background-color: #9b59b6 !important; }
        
        .klasse { font-weight: bold; font-size: 0.9em; line-height: 1.2; }
        .status { font-size: 0.8em; color: #fff; font-style: italic; margin-top: 2px; }
        
        select { width: 90%; padding: 5px; background: #444; color: white; border: none; }
    </style>
</head>
<body>

    <div class="grid" id="plan">
        <div class="box header">Zeit</div>
        <div class="box header-tag">MONTAG</div>
        <div class="box btn-cell">
            <button id="saveBtn" class="save-btn" onclick="saveAllChanges()" disabled>Speichern</button>
        </div>
    </div>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbxGV-J5CTk8xVKtIm_w_3LKSekWJPP_KFofDqejD5tZKcGVZhTnpZyg4_6N5th2MhSXiA/exec";
        let pendingChanges = [];

        function getColorClass(status) {
            const classes = { "Halle 1": "halle1", "Halle 2": "halle2", "Halle 3": "halle3", "Halle 4": "halle4", "U21": "u21" };
            return classes[status] || "";
        }

        fetch(url).then(r => r.json()).then(data => {
            const container = document.getElementById('plan');
            data.forEach((row, i) => {
                if(i === 0) return; 
                container.innerHTML += `<div class="box zeit">${row[0]}</div>`;
                for(let j = 1; j <= 5; j++) {
                    let val = row[j] || "";
                    let parts = val.split("|");
                    let klasseName = parts[0].trim();
                    let statusName = (parts[1] || "").trim();
                    let cClass = getColorClass(statusName);

                    container.innerHTML += `
                        <div class="box ${statusName ? 'besetzt ' + cClass : ''}" onclick="openMenu(this)">
                            <span class="klasse">${klasseName}</span>
                            <span class="status">${statusName}</span>
                            <select style="display:none" data-klasse="${klasseName}" onchange="updateView(this, ${i}, ${j})">
                                <option value="">---</option>
                                <option value="Halle 1" ${statusName==='Halle 1'?'selected':''}>Halle 1</option>
                                <option value="Halle 2" ${statusName==='Halle 2'?'selected':''}>Halle 2</option>
                                <option value="Halle 3" ${statusName==='Halle 3'?'selected':''}>Halle 3</option>
                                <option value="Halle 4" ${statusName==='Halle 4'?'selected':''}>Halle 4</option>
                                <option value="U21" ${statusName==='U21'?'selected':''}>U21</option>
                            </select>
                        </div>`;
                }
            });
        });

        function openMenu(box) {
            box.querySelector('.status').style.display = 'none';
            box.querySelector('select').style.display = 'block';
        }

        function updateView(selectEl, row, col) {
            let box = selectEl.parentElement;
            let klasse = selectEl.getAttribute('data-klasse');
            let status = selectEl.value;
            let finalVal = status ? (klasse + " | " + status) : klasse;

            box.className = 'box'; 
            if(status) box.className += ' besetzt ' + getColorClass(status);
            
            box.querySelector('.status').innerText = status;
            box.querySelector('.status').style.display = 'block';
            selectEl.style.display = 'none';

            pendingChanges = pendingChanges.filter(c => !(c.row === row && c.col === col));
            pendingChanges.push({ row, col, val: finalVal });

            const btn = document.getElementById('saveBtn');
            if (pendingChanges.length > 0) {
                btn.classList.add('active');
                btn.disabled = false;
            }
        }

        async function saveAllChanges() {
            if (pendingChanges.length === 0) return;
            document.getElementById('saveBtn').innerText = "Speichere...";
            for (let change of pendingChanges) {
                await fetch(url, { method: "POST", body: JSON.stringify(change), mode: "no-cors" });
            }
            location.reload();
        }
    </script>
</body>
</html>
