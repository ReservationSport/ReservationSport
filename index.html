<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        /* Login Overlay Style */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #f4f4f9; z-index: 9999; text-align: center; padding-top: 20%;
        }
        /* Dein restliches CSS kommt hier hin */
        .box { border: 1px solid #ddd; padding: 10px; margin: 5px; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <h3>Lehrkräfte-Login</h3>
        <p>Bitte Kürzel eingeben:</p>
        <input type="text" id="kuerzel" maxlength="2" style="text-transform:uppercase; text-align:center; font-size:20px; width:60px;">
        <br><br>
        <button onclick="doLogin()">Anmelden</button>
    </div>

    <div id="app">
        </div>

    <script>
        // LOGIN-FUNKTION
        function doLogin() {
            var kuerzel = document.getElementById('kuerzel').value;
            if (kuerzel.length < 2) { alert("Bitte 2-stelliges Kürzel eingeben"); return; }
            
            google.script.run.withSuccessHandler(function(isValid) {
                if (isValid) {
                    document.getElementById('loginOverlay').style.display = 'none';
                    // Hier ggf. deinen Plan laden
                    // loadPlan(); 
                } else {
                    alert("Kürzel ungültig!");
                }
            }).checkLogin(kuerzel);
        }

        // DEINE BESTEHENDEN FUNKTIONEN (addChange, loadPlan etc.)
        // ...
    </script>
</body>
</html>
