<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Stundenplan Journal</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: 120px repeat(5, 1fr); gap: 2px; max-width: 1000px; margin: auto; }
        .date-control { text-align: center; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; gap: 15px; }
        .nav-group { display: flex; gap: 5px; width: 90px; }
        #datePicker { padding: 10px; background: #333; color: white; border: 1px solid #444; height: 40px; cursor: pointer; }
        .nav-btn { height: 40px; width: 40px; background: #333; border: 1px solid #444; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; visibility: hidden; }
        .box { border: 1px solid #444; padding: 5px; background: #262626; min-height: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; font-size: 11px; position: relative; }
        .zeit-box { background: #333; font-weight: bold; }
        .header-row { grid-column: span 6; background: #333; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; }
        .save-btn { padding: 5px 15px; background: #444; color: white; cursor: pointer; border-radius: 3px; }
        .bg-red { background: #c0392b !important; } .bg-blue { background: #2980b9 !important; }
        .bg-purple { background: #8e44ad !important; } .bg-yellow { background: #f1c40f !important; color: black !important; }
        select { width: 100%; height: 100%; position: absolute; top: 0; left: 0; opacity: 0; cursor: pointer; }
    </style>
</head>
<body>
    <div class="date-control">
        <div class="nav-group">
            <button id="btnBack7" class="nav-btn" onclick="window.changeDate(-7)">⏮</button>
            <button id="btnBack1" class="nav-btn" onclick="window.changeDate(-1)">◀</button>
        </div>
        <input type="date" id="datePicker">
        <div class="nav-group">
            <button class="nav-btn" style="visibility: visible;" onclick="window.changeDate(1)">▶</button>
            <button class="nav-btn" style="visibility: visible;" onclick="window.changeDate(7)">⏭</button>
        </div>
    </div>
    <div class="grid" id="plan"></div>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbzfB81kQO3eJy06b3O6-tFRHIH2S98p6C68mdpIxeLiw5cT56TlEQ6G83QNpI8dgw0v4A/exec";
        
        // Funktionen explizit an window binden
        window.changeDate = function(days) { 
            const dp = document.getElementById('datePicker'); 
            let d = new Date(dp.value); 
            d.setDate(d.getDate() + days); 
            dp.valueAsDate = d; 
            loadPlan(); 
        };

        async function loadPlan() {
            // ... (Hier der Rest deiner loadPlan Logik wie gehabt)
            console.log("Plan wird geladen...");
            // Teste ob URL erreichbar ist
        }

        document.addEventListener('DOMContentLoaded', () => { 
            const today = new Date();
            const offset = today.getTimezoneOffset();
            today.setMinutes(today.getMinutes() - offset);
            document.getElementById('datePicker').value = today.toISOString().split('T')[0];
            loadPlan(); 
        });
    </script>
</body>
</html>
