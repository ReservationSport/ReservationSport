<div class="grid" id="sportplan"></div>

<script>
  // Hier deine Web-App-URL aus dem Google Apps Script einfügen
  const url = https://script.google.com/macros/s/AKfycbxGV-J5CTk8xVKtIm_w_3LKSekWJPP_KFofDqejD5tZKcGVZhTnpZyg4_6N5th2MhSXiA/exec;

  fetch(url)
    .then(response => response.json())
    .then(data => {
      const container = document.getElementById('sportplan');
      data.forEach(row => {
        // Hier bauen wir aus den Zeilen deine Kacheln
        container.innerHTML += `<div class="box">${row[0]} - ${row[1]}</div>`;
      });
    });
</script>
