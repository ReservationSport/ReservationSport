<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Stundenplan Journal</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: 120px repeat(5, 1fr); gap: 2px; max-width: 1000px; margin: auto; }
        .date-control { text-align: center; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; gap: 15px; position: relative; }
        .global-loader { position: absolute; right: 0; width: 30px; height: 30px; border: 4px solid #444; border-top: 4px solid #27ae60; border-radius: 50%; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .nav-group { display: flex; gap: 5px; width: 90px; }
        #datePicker { padding: 10px; background: #333; color: white; border: 1px solid #444; height: 40px; box-sizing: border-box; cursor: pointer; }
        .nav-btn { height: 40px; width: 40px; background: #333; border: 1px solid #444; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; visibility: hidden; }
        .box { border: 1px solid #444; padding: 5px; background: #262626; min-height: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; font-size: 11px; position: relative; cursor: pointer; }
        .zeit-box { background: #333; font-weight: bold; cursor: default; }
        .header-row { grid-column: span 6; background: #333; font-size: 14px; font-weight: bold; position: relative; display: flex; align-items: center; justify-content: center; height: 50px; }
        .info-box { grid-column: span 6; padding: 40px; text-align: center; color: #888; font-style: italic; }
        .klasse { font-weight: bold; }
        .res { font-style: italic; font-size: 9px; margin-top: 2px; }
        .bg-red { background: #c0392b !important; } .bg-blue { background: #2980b9 !important; }
        .bg-purple { background: #8e44ad !important; } .bg-yellow { background: #f1c40f !important; color: black !important; }
        select { width: 100%; height: 100%; position: absolute; top: 0; left: 0; opacity: 0; cursor: pointer; }
        .save-container { position: absolute; right: 10px; z-index: 10; display: flex; align-items: center; }
        .save-btn { padding: 5px 15px; background: #444; border: 1px solid #666; color: white; cursor: pointer; border-radius: 3px; }
        .save-btn.pending { background: #27ae60; }
        .sport-loader { font-size: 20px; display: none; animation: bounce 0.6s infinite alternate; margin-right: 10px; }
        @keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-10px); } }
        .divider-thin { grid-column: 1 / span 6; height: 1px; background: #444; margin: 2px 0; }
        .divider-thick { grid-column: 1 / span 6; height: 4px; background: #444; margin: 5px 0; }
    </style>
</head>
<body>
    <div class="date-control">
        <div class="nav-group">
            <button id="btnBack7" class="nav-btn" onclick="window.changeDate(-7)">⏮</button>
            <button id="btnBack1" class="nav-btn" onclick="window.changeDate(-1)">◀</button>
        </div>
        <input type="date" id="datePicker">
        <div class="nav-group">
            <button class="nav-btn" style="visibility: visible;" onclick="window.changeDate(1)">▶</button>
            <button class="nav-btn" style="visibility: visible;" onclick="window.changeDate(7)">⏭</button>
        </div>
        <div id="globalLoader" class="global-loader"></div>
    </div>
    <div class="grid" id="plan"></div>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbzfB81kQO3eJy06b3O6-tFRHIH2S98p6C68mdpIxeLiw5cT56TlEQ6G83QNpI8dgw0v4A/exec";
        let pendingChanges = [];

        function toggleLoader(show) { document.getElementById('globalLoader').style.display = show ? 'block' : 'none'; }

        function updateNavButtons() {
            const dateVal = document.getElementById('datePicker').value;
            if(!dateVal) return;
            const selectedDate = new Date(dateVal);
            selectedDate.setHours(12,0,0,0);
            const today = new Date();
            today.setHours(12,0,0,0);
            const diffDays = Math.ceil((selectedDate - today) / (1000 * 60 * 60 * 24));
            
            document.getElementById('btnBack1').style.visibility = (diffDays > 0) ? 'visible' : 'hidden';
            document.getElementById('btnBack7').style.visibility = (diffDays >= 7) ? 'visible' : 'hidden';
        }

        async function loadPlan() {
            const dateVal = document.getElementById('datePicker').value;
            if (!dateVal) return;
            toggleLoader(true);
            const container = document.getElementById('plan');
            container.innerHTML = ""; pendingChanges = [];
            
            updateNavButtons();

            const dateObj = new Date(dateVal);
            dateObj.setHours(12,0,0,0);
            const heute = new Date(); heute.setHours(12,0,0,0);
            
            if (dateObj < heute) { container.innerHTML = `<div class="box info-box">Vergangene Tage nicht bearbeitbar.</div>`; toggleLoader(false); return; }
            if (dateObj.getDay() === 0 || dateObj.getDay() === 6) { container.innerHTML = `<div class="box info-box">Wochenende.</div>`; toggleLoader(false); return; }

            try {
                const res = await fetch(`${url}?date=${dateVal}`);
                const data = await res.json();
                const wochentage = ["Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"];
                data.forEach((row, rowIndex) => {
                    if (rowIndex === 0) {
                        container.innerHTML += `<div class="box header-row"><span>${wochentage[dateObj.getDay()]}, ${dateObj.toLocaleDateString('de-DE')}</span><div class="save-container"><div id="sport-loader" class="sport-loader">⚽</div><button id="saveBtn" class="save-btn" onclick="window.saveChanges()">SPEICHERN</button></div></div>`;
                    } else {
                        if (rowIndex === 4 || rowIndex === 10) container.innerHTML += `<div class="divider-thin"></div>`;
                        if (rowIndex === 7) container.innerHTML += `<div class="divider-thick"></div>`;
                        container.innerHTML += `<div class="box zeit-box">${row[0]}</div>`;
                        for(let i = 1; i <= 5; i++) {
                            let val = row[i] || ""; let teile = val.split(' | '); let klasse = teile[0]; let res = teile[1] || "";
                            container.innerHTML += `<div class="box ${getFarbe(res)}"><div class="klasse">${klasse}</div><div class="res">${res}</div><select onchange="window.addChange(this, '${row[0]}', ${i}, '${klasse}')"><option value="">---</option>${["Halle 1", "Halle 2", "Halle 3", "Halle 4", "U21", "Kletterwand"].map(r => `<option value="${r}" ${res === r ? 'selected' : ''}>${r}</option>`).join('')}</select></div>`;
                        }
                    }
                });
            } catch (e) { console.error(e); container.innerHTML = `<div class="box info-box">Fehler beim Laden.</div>`; } finally { toggleLoader(false); }
        }

        window.addChange = (el, time, slotIndex, klasse) => { 
            let res = el.value; 
            el.parentElement.querySelector('.res').innerText = (res === "" || res === "---") ? "" : res; 
            el.parentElement.className = `box ${getFarbe(res)}`; 
            pendingChanges.push({ time, slotIndex, val: (res === "" || res === "---") ? klasse : klasse + " | " + res }); 
            document.getElementById('saveBtn').classList.add('pending'); 
        };

        window.saveChanges = async () => { 
            if(pendingChanges.length === 0) return; 
            const btn = document.getElementById('saveBtn'), ball = document.getElementById('sport-loader'); 
            btn.style.display = 'none'; ball.style.display = 'block'; 
            await fetch(url, { method: "POST", body: JSON.stringify({ date: document.getElementById('datePicker').value, changes: pendingChanges }) }); 
            pendingChanges = []; ball.style.display = 'none'; btn.style.display = 'block'; btn.classList.remove('pending'); btn.innerText = "GESPEICHERT!"; 
            setTimeout(() => btn.innerText = "SPEICHERN", 2000); 
        };

        window.changeDate = (days) => { 
            const dp = document.getElementById('datePicker'); 
            let d = new Date(dp.value); 
            d.setDate(d.getDate() + days); 
            dp.valueAsDate = d; 
            loadPlan(); 
        };

        function getFarbe(res) { 
            if(res.includes("Halle 1")) return "bg-red"; 
            if(res.includes("Halle 4")) return "bg-blue"; 
            if(res.includes("U21")) return "bg-purple"; 
            if(res.includes("Halle 2")) return "bg-yellow"; 
            return ""; 
        }

        document.addEventListener('DOMContentLoaded', () => { 
            const today = new Date();
            const offset = today.getTimezoneOffset();
            today.setMinutes(today.getMinutes() - offset);
            document.getElementById('datePicker').value = today.toISOString().split('T')[0];
            loadPlan(); 
            document.getElementById('datePicker').addEventListener('change', loadPlan);
        });
    </script>
</body>
</html>
