<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Stundenplan Journal</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: 120px repeat(5, 1fr); gap: 4px; max-width: 1000px; margin: auto; }
        
        /* Dropdown-Zellen Design */
        .box { 
            border: 1px solid #444; padding: 5px; background: #262626; min-height: 60px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            text-align: center; font-size: 11px; position: relative; transition: 0.2s;
        }
        .box:hover { border-color: #555; background: #2a2a2a; }
        
        /* Stylisches Overlay für das Dropdown */
        .dropdown-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            cursor: pointer; opacity: 0; /* Das echte <select> ist hier unsichtbar */
        }
        
        /* Das eigentliche Select-Element für den Browser */
        select {
            width: 100%; height: 100%; opacity: 0; cursor: pointer;
        }

        /* Pfeil-Icon für das Dropdown-Feld (optisch) */
        .box::after {
            content: '▼'; font-size: 8px; color: #666; position: absolute; bottom: 2px; right: 4px;
            pointer-events: none;
        }

        .zeit-box { background: #333; font-weight: bold; cursor: default; }
        .header-row { grid-column: span 5; background: #333; font-size: 14px; font-weight: bold; padding: 10px; display: flex; align-items: center; justify-content: center; position: relative; }
        
        /* Farben & Text */
        .klasse { font-weight: bold; }
        .res { font-style: italic; font-size: 10px; margin-top: 4px; color: #aaa; }
        .bg-red { background: #78281f !important; }
        .bg-blue { background: #1b4f72 !important; }
        .bg-purple { background: #5b2c6f !important; }
        .bg-yellow { background: #9a7d0a !important; color: white !important; }

        /* ... (Der Rest der Styles für Loader & Buttons bleibt wie gehabt) ... */
    </style>
</head>
<body>
    <script>
        // In der loadPlan Funktion:
        // Wir setzen das <select> in ein div mit .dropdown-wrapper für besseres Styling
        // ...
        container.innerHTML += `
            <div class="box ${getFarbe(reservierung)}">
                <div class="klasse">${klasse}</div>
                <div class="res">${reservierung}</div>
                <div class="dropdown-wrapper">
                    <select onchange="addChange(this, '${row[0]}', ${i}, '${klasse}')">
                        <option value="">---</option>
                        ${["Halle 1", "Halle 2", "Halle 3", "Halle 4", "U21", "Kletterwand"].map(r => `<option value="${r}">${r}</option>`).join('')}
                    </select>
                </div>
            </div>`;
    </script>
</body>
</html>
