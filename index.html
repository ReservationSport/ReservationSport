<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Stundenplan Journal</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .wrapper { max-width: 1000px; margin: auto; }
        
        .top-bar { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 10px; margin-bottom: 20px; align-items: center; }
        #datePicker { padding: 10px; background: #333; color: white; border: 1px solid #444; width: 100%; box-sizing: border-box; }
        #saveBtn { padding: 10px; background: #333; color: #666; border: 1px solid #444; font-weight: bold; cursor: not-allowed; width: 100%; transition: 0.3s; }
        #saveBtn.active { background: #27ae60; color: white; cursor: pointer; border-color: #2ecc71; }
        
        /* Das Grid muss 6 Spalten haben */
        .grid { display: grid; grid-template-columns: 120px repeat(5, 1fr); gap: 2px; }
        .box { border: 1px solid #444; padding: 5px; background: #262626; min-height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; font-size: 11px; position: relative; cursor: pointer; }
        .header-box { background: #333; font-weight: bold; cursor: default; }
        
        #dataArea { display: contents; } 
        .trennlinie { grid-column: 1 / span 6; height: 4px; background: #3498db; margin: 4px 0; }
        .klasse { font-weight: bold; font-size: 12px; }
        .res { font-style: italic; font-size: 10px; margin-top: 3px; }
        select { width: 100%; height: 100%; position: absolute; top: 0; left: 0; opacity: 0; cursor: pointer; }
        
        .bg-red { background: #e74c3c !important; }
        .bg-blue { background: #3498db !important; }
        .bg-purple { background: #9b59b6 !important; }
        .bg-yellow { background: #f1c40f !important; color: black !important; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="top-bar">
            <input type="date" id="datePicker">
            <div id="headerTitle" style="text-align: center; font-weight: bold; font-size: 1.2rem;">WIRD GELADEN...</div>
            <button id="saveBtn" onclick="saveChanges()">SPEICHERN</button>
        </div>

        <div class="grid" id="plan">
            <div class="box header-box">Zeit</div>
            <div class="box header-box">1</div>
            <div class="box header-box">2</div>
            <div class="box header-box">3</div>
            <div class="box header-box">4</div>
            <div class="box header-box">5</div>
            
            <div id="dataArea"></div>
        </div>
    </div>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbzfB81kQO3eJy06b3O6-tFRHIH2S98p6C68mdpIxeLiw5cT56TlEQ6G83QNpI8dgw0v4A/exec";
        let pendingChanges = [];

        function getFarbe(res) {
            if (res.includes("Halle 1")) return "bg-red";
            if (res.includes("Halle 4")) return "bg-blue";
            if (res.includes("U21")) return "bg-purple";
            if (res.includes("Halle 2")) return "bg-yellow";
            return "";
        }

        async function loadPlan() {
            const dateVal = document.getElementById('datePicker').value;
            const res = await fetch(`${url}?date=${dateVal}`);
            const data = await res.json();
            
            // Nur dataArea leeren, die Kopfzeile im HTML bleibt unberührt!
            const dataArea = document.getElementById('dataArea');
            dataArea.innerHTML = ""; 
            pendingChanges = [];
            updateSaveBtn();
            
            const tage = ["SONNTAG", "MONTAG", "DIENSTAG", "MITTWOCH", "DONNERSTAG", "FREITAG", "SAMSTAG"];
            document.getElementById('headerTitle').innerText = `${tage[new Date(dateVal).getDay()]} - ${new Date(dateVal).toLocaleDateString('de-DE')}`;
            
            data.forEach((row, rowIndex) => {
                if (rowIndex === 6) dataArea.innerHTML += `<div class="trennlinie"></div>`;
                dataArea.innerHTML += `<div class="box header-box">${row[0]}</div>`;
                for(let i = 1; i <= 5; i++) {
                    let val = row[i] || "";
                    let [kl, res] = val.includes(' | ') ? val.split(' | ') : [val, ""];
                    dataArea.innerHTML += `
                        <div class="box ${getFarbe(res)}" onclick="this.querySelector('select').style.opacity='1'">
                            <div class="klasse">${kl || ""}</div>
                            <div class="res">${res || ""}</div>
                            <select onchange="addChange(this, '${row[0]}', ${i}, '${kl || ""}')">
                                <option value="">---</option>
                                ${["Halle 1", "Halle 2", "Halle 3", "Halle 4", "U21", "Kletterwand"].map(r => `<option value="${r}">${r}</option>`).join('')}
                            </select>
                        </div>`;
                }
            });
        }

        function addChange(el, time, slotIndex, klasse) {
            let res = el.value;
            let anzeigeRes = (res === "" || res === "---") ? "" : res;
            let speicherWert = anzeigeRes === "" ? klasse : klasse + " | " + res;
            el.parentElement.querySelector('.res').innerText = anzeigeRes;
            el.parentElement.className = `box ${getFarbe(anzeigeRes)}`;
            pendingChanges.push({ time, slotIndex, val: speicherWert });
            updateSaveBtn();
            el.style.opacity = '0';
        }

        function updateSaveBtn() {
            const btn = document.getElementById('saveBtn');
            btn.className = pendingChanges.length > 0 ? "active" : "";
            btn.disabled = pendingChanges.length === 0;
        }

        async function saveChanges() {
            await fetch(url, { method: "POST", body: JSON.stringify({ date: document.getElementById('datePicker').value, changes: pendingChanges }) });
            pendingChanges = [];
            updateSaveBtn();
            loadPlan();
        }

        document.addEventListener("DOMContentLoaded", () => {
            const dp = document.getElementById('datePicker');
            dp.value = new Date(new Date().getTime() - (new Date().getTimezoneOffset() * 60000)).toISOString().split('T')[0];
            dp.addEventListener('change', loadPlan);
            loadPlan();
        });
    </script>
</body>
</html>
