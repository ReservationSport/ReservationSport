<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Stundenplan Journal</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: 120px repeat(5, 1fr); gap: 2px; max-width: 1000px; margin: auto; }
        
        .date-control { text-align: center; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; gap: 15px; position: relative; }
        
        .global-loader { position: absolute; right: 0; width: 30px; height: 30px; border: 4px solid #444; border-top: 4px solid #27ae60; border-radius: 50%; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .nav-group { display: flex; gap: 5px; }
        #datePicker { padding: 10px; background: #333; color: white; border: 1px solid #444; height: 40px; box-sizing: border-box; cursor: pointer; }
        .nav-btn { height: 40px; width: 40px; background: #333; border: 1px solid #444; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .nav-btn:hover { background: #444; }

        .box { border: 1px solid #444; padding: 5px; background: #262626; min-height: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; font-size: 11px; position: relative; cursor: pointer; }
        .zeit-box { background: #333; font-weight: bold; cursor: default; }
        .header-row { grid-column: span 5; background: #333; font-size: 14px; font-weight: bold; cursor: default; position: relative; display: flex; align-items: center; justify-content: center; }
        .info-box { grid-column: span 6; padding: 40px; text-align: center; color: #888; font-style: italic; }
        
        .klasse { font-weight: bold; }
        .res { font-style: italic; font-size: 9px; margin-top: 2px; }
        .bg-red { background: #c0392b !important; }
        .bg-blue { background: #2980b9 !important; }
        .bg-purple { background: #8e44ad !important; }
        .bg-yellow { background: #f1c40f !important; color: black !important; }
        
        select { width: 100%; height: 100%; position: absolute; top: 0; left: 0; opacity: 0; cursor: pointer; }
        
        /* Save-Bereich & Basketball */
        .save-container { position: absolute; right: 10px; z-index: 10; display: flex; align-items: center; }
        .save-btn { padding: 5px 15px; background: #444; border: 1px solid #666; color: white; cursor: pointer; font-size: 10px; transition: 0.3s; border-radius: 3px; }
        .save-btn.pending { background: #27ae60; border-color: #2ecc71; color: white; }
        
        .basket-loader { 
            display: none; 
            width: 28px; height: 28px; 
            margin-right: 10px;
            fill: #fff;
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>
    <div class="date-control">
        <div class="nav-group">
            <button class="nav-btn" onclick="changeDate(-7)">⏮</button>
            <button class="nav-btn" onclick="changeDate(-1)">◀</button>
        </div>
        <input type="date" id="datePicker">
        <div class="nav-group">
            <button class="nav-btn" onclick="changeDate(1)">▶</button>
            <button class="nav-btn" onclick="changeDate(7)">⏭</button>
        </div>
        <div id="globalLoader" class="global-loader"></div>
    </div>
    <div class="grid" id="plan"></div>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbzfB81kQO3eJy06b3O6-tFRHIH2S98p6C68mdpIxeLiw5cT56TlEQ6G83QNpI8dgw0v4A/exec";
        let pendingChanges = [];

        function toggleLoader(show) { document.getElementById('globalLoader').style.display = show ? 'block' : 'none'; }

        async function loadPlan() {
            const dateVal = document.getElementById('datePicker').value;
            if (!dateVal) return;
            toggleLoader(true);
            const container = document.getElementById('plan');
            container.innerHTML = "";
            pendingChanges = [];

            const dateObj = new Date(dateVal);
            if (dateObj.getDay() === 0 || dateObj.getDay() === 6) {
                container.innerHTML = `<div class="box info-box">Kein Unterricht am Wochenende.</div>`;
                toggleLoader(false);
                return;
            }

            try {
                const res = await fetch(`${url}?date=${dateVal}`);
                const data = await res.json();
                const wochentage = ["Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"];
                const titelText = `${wochentage[dateObj.getDay()]}, ${dateObj.toLocaleDateString('de-DE')}`;
                
                data.forEach((row, rowIndex) => {
                    if (rowIndex === 7) container.innerHTML += `<div style="grid-column: 1 / span 6; height: 4px; background: #3498db; margin: 5px 0;"></div>`;
                    container.innerHTML += `<div class="box zeit-box">${row[0]}</div>`;
                    
                    if (rowIndex === 0) {
                        container.innerHTML += `
                            <div class="box header-row">
                                <span>${titelText}</span>
                                <div class="save-container">
                                    <svg class="basket-loader" id="save-loader" viewBox="0 0 24 24"><path d="M12,2A10,10 0 1,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 19.3,9H16.1C15.8,7.3 14.3,6 12.5,6C11,6 9.7,7.1 9.2,8.5C8.8,10 8.9,11.5 9.7,12.8C10.5,14.1 11.9,14.9 13.5,14.9C15.3,14.9 16.8,13.6 17.1,11.9H20.3C19.8,14.1 18.5,16.1 16.6,17.4C14.7,18.7 12.4,19.2 10.1,18.8C7.8,18.4 5.8,17.1 4.5,15.2C3.2,13.3 2.7,11 3.1,8.7C3.5,6.4 4.8,4.4 6.7,3.1C8.6,1.8 10.9,1.3 13.2,1.7C15.5,2.1 17.5,3.4 18.8,5.3C19.5,6.3 19.9,7.4 20.2,8.6C19.9,8.9 19.6,9.1 19.3,9Z"/></svg>
                                    <button id="saveBtn" class="save-btn" onclick="saveChanges()">SPEICHERN</button>
                                </div>
                            </div>`;
                    } else {
                        for(let i = 1; i <= 5; i++) {
                            let val = row[i] || "";
