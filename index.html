<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Stundenplan Journal</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: 120px repeat(5, 1fr); gap: 2px; max-width: 1000px; margin: auto; }
        
        .box { border: 1px solid #444; padding: 5px; background: #262626; min-height: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; font-size: 11px; position: relative; cursor: pointer; }
        .zeit-box { background: #333; font-weight: bold; cursor: default; }
        
        .header-row { 
            grid-column: span 5; 
            background: #333; 
            font-size: 14px; 
            font-weight: bold; 
            cursor: default; 
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .info-box { grid-column: span 6; padding: 40px; text-align: center; color: #888; font-style: italic; }
        
        .klasse { font-weight: bold; }
        .res { font-style: italic; font-size: 9px; margin-top: 2px; }
        
        .bg-red { background: #c0392b !important; }
        .bg-blue { background: #2980b9 !important; }
        .bg-purple { background: #8e44ad !important; }
        .bg-yellow { background: #f1c40f !important; color: black !important; }

        .sport-loader { 
            font-size: 20px; 
            position: absolute; 
            right: 120px; 
            display: none; 
            animation: bounce 0.6s infinite alternate; 
        }

        @keyframes bounce {
            0% { transform: translateY(0); animation-timing-function: ease-out; }
            50% { transform: translateY(-15px) scaleX(1.05); animation-timing-function: ease-in; }
            100% { transform: translateY(0) scaleX(0.95); }
        }
        
        select { width: 100%; height: 100%; position: absolute; top: 0; left: 0; opacity: 0; cursor: pointer; }
        
        .save-btn { 
            position: absolute;
            right: 10px;
            padding: 5px 15px; 
            background: #444; 
            border: 1px solid #666; 
            color: white; 
            cursor: pointer; 
            font-size: 10px;
            transition: 0.3s;
            border-radius: 3px;
            z-index: 10;
        }
        .save-btn.pending { background: #27ae60; border-color: #2ecc71; color: white; }
        .save-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        /* Button für nächsten Tag */
        .nav-btn {
            padding: 8px 15px;
            background: #333;
            border: 1px solid #444;
            color: white;
            cursor: pointer;
            margin-left: 5px;
        }
        .nav-btn:hover { background: #444; }
    </style>
</head>
<body>
    <div style="text-align: center; margin-bottom: 20px;">
        <input type="date" id="datePicker" onchange="loadPlan()" style="padding: 10px; background: #333; color: white; border: 1px solid #444;">
        <button class="nav-btn" onclick="changeDate(1)">▶</button>
    </div>
    <div class="grid" id="plan"></div>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbzfB81kQO3eJy06b3O6-tFRHIH2S98p6C68mdpIxeLiw5cT56TlEQ6G83QNpI8dgw0v4A/exec";
        let pendingChanges = [];

        // Funktion zum Datumswechsel
        function changeDate(days) {
            let date = new Date(document.getElementById('datePicker').value);
            date.setDate(date.getDate() + days);
            document.getElementById('datePicker').valueAsDate = date;
            loadPlan();
        }

        function getFarbe(res) {
            if (res.includes("Halle 1")) return "bg-red";
            if (res.includes("Halle 4")) return "bg-blue";
            if (res.includes("U21")) return "bg-purple";
            if (res.includes("Halle 2")) return "bg-yellow";
            return "";
        }

        async function loadPlan() {
            const dateVal = document.getElementById('datePicker').value;
            const dateObj = new Date(dateVal);
            const container = document.getElementById('plan');
            container.innerHTML = "";
            pendingChanges = [];

            if (dateObj.getDay() === 0 || dateObj.getDay() === 6) {
                container.innerHTML = `<div class="box info-box">Kein Unterricht am Wochenende.</div>`;
                return;
            }

            const res = await fetch(`${url}?date=${dateVal}`);
            const data = await res.json();
            
            const wochentage = ["Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"];
            const titelText = `${wochentage[dateObj.getDay()]}, ${dateObj.toLocaleDateString('de-DE')}`;
            
            data.forEach((row, rowIndex) => {
                if (rowIndex === 7) container.innerHTML += `<div style="grid-column: 1 / span 6; height: 4px; background: #3498db; margin: 5px 0;"></div>`;
                
                container.innerHTML += `<div class="box zeit-box">${row[0]}</div>`;
                
                if (rowIndex === 0) {
                    container.innerHTML += `
                        <div class="box header-row">
                            <span>${titelText}</span>
                            <div id="sport-loader-header" class="sport-loader">⚽</div>
                            <button id="saveBtn" class="save-btn" onclick="saveChanges()">SPEICHERN</button>
                        </div>`;
                } else {
                    for(let i = 1; i <= 5; i++) {
                        let val = row[i] || "";
                        let teile = val.split(' | ');
                        let klasse = teile[0];
                        let reservierung = teile[1] || "";
                        let farbKlasse = getFarbe(reservierung);
                        
                        container.innerHTML += `
                            <div class="box ${farbKlasse}">
                                <div class="klasse">${klasse}</div>
                                <div class="res">${reservierung}</div>
                                <select onchange="addChange(this, '${row[0]}', ${i}, '${klasse}')">
                                    <option value="">---</option>
                                    ${["Halle 1", "Halle 2", "Halle 3", "Halle 4", "U21", "Kletterwand"].map(r => `<option value="${r}">${r}</option>`).join('')}
                                </select>
                            </div>`;
                    }
                }
            });
        }

        function addChange(el, time, slotIndex, klasse) {
            let res = el.value;
            let speicherWert = (res === "" || res === "---") ? klasse : klasse + " | " + res;
            el.parentElement.querySelector('.res').innerText = (res === "" || res === "---") ? "" : res;
            el.parentElement.className = `box ${getFarbe(res)}`;
            el.style.opacity = '0';
            pendingChanges.push({ time, slotIndex, val: speicherWert });
            
            const btn = document.getElementById('saveBtn');
            if(btn) btn.classList.add('pending');
        }

        async function saveChanges() {
            if (pendingChanges.length === 0) return;
            const btn = document.getElementById('saveBtn');
            const loader = document.getElementById('sport-loader-header');
            
            btn.disabled = true;
            btn.innerText = "Speichere...";
            if(loader) loader.style.display = 'block';
            
            await fetch(url, { method: "POST", body: JSON.stringify({ date: document.getElementById('datePicker').value, changes: pendingChanges }) });
            
            pendingChanges = [];
            if(loader) loader.style.display = 'none';
            
            btn.classList.remove('pending');
            btn.innerText = "GESPEICHERT!";
            btn.disabled = false;
            
            setTimeout(() => { btn.innerText = "SPEICHERN"; }, 2000);
        }

        document.getElementById('datePicker').valueAsDate = new Date();
        loadPlan();
    </script>
</body>
</html>
